name: Publish

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish-main
      cancel-in-progress: false
    environment: npm

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Show npm config (safe)
        run: npm config list

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        run: |
          npm version patch -m "chore(release): %s [skip ci]"

      - name: Push version commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance --ignore-scripts --loglevel verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}