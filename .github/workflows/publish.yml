name: Publish

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    concurrency:
      group: npm-publish-main
      cancel-in-progress: false
    environment: npm

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Enforce Trusted Publishing (OIDC only)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ] || [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "Legacy npm token secret detected."
            echo "Remove NPM_TOKEN/NODE_AUTH_TOKEN secrets and use npm Trusted Publisher (OIDC) only."
            exit 1
          fi
          rm -f .npmrc ~/.npmrc

      - name: Install dependencies
        run: npm ci

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Show npm config (safe)
        run: npm config list

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

      - name: Publish to npm with provenance
        run: npm run release