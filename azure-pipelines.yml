# Node.js
# Build and publish n8n community node for TeamDynamix
# Publishes to npm registry on main branch after successful build and lint
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '22.x'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: $(nodeVersion)
    displayName: 'Install Node.js'

  - script: |
      npm ci
    displayName: 'npm clean install'

  - script: |
      npm run lint
    displayName: 'Run linter'

  - script: |
      npm run build
    displayName: 'Build'

  - task: npmAuthenticate@0
    inputs:
      workingFile: '.npmrc'
    displayName: 'Authenticate to npm registry'
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')))

  - script: |
      npm publish
    displayName: 'Publish to npm registry'
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')))
    env:
      NODE_AUTH_TOKEN: $(npm.token)
